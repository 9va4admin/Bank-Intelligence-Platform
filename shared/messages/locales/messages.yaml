# ASTRA Message Taxonomy — single source of truth
# Format: each key carries metadata + one text entry per locale.
# Locale text is empty string for untranslated stubs.
# To add a locale: add a new text field (e.g. 'mr:') for every key.
# Run: python -m shared.messages.build  →  refreshes Redis + JSON bundles.

