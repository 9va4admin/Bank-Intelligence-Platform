# ── Configuration changes ─────────────────────────────────────────────────────
PLATFORM_CONFIG_CHANGE_SUBMITTED:
  text: "Config change submitted by {submitted_by} — key: {config_key}, new value: {new_value}. Pending approval."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [submitted_by, config_key, new_value]

PLATFORM_CONFIG_CHANGE_APPROVED:
  text: "Config change approved by {approved_by} — {config_key} updated from {old_value} to {new_value}."
  severity: WARN
  surface: [AUDIT, NOTIFICATION]
  variables: [approved_by, config_key, old_value, new_value]

PLATFORM_CONFIG_CHANGE_REJECTED:
  text: "Config change rejected by {rejected_by} — {config_key}. Reason: {reason}."
  severity: WARN
  surface: [AUDIT, NOTIFICATION]
  variables: [rejected_by, config_key, reason]

PLATFORM_CONFIG_HOT_RELOADED:
  text: "Config hot-reload triggered for {bank_id} — {key_count} keys updated from Kafka event."
  severity: INFO
  surface: [AUDIT]
  variables: [bank_id, key_count]

# ── OPA policy changes ────────────────────────────────────────────────────────
PLATFORM_POLICY_SUBMITTED:
  text: "OPA policy {policy_name} v{version} submitted by {submitted_by} — pending approval."
  severity: INFO
  surface: [AUDIT]
  variables: [policy_name, version, submitted_by]

PLATFORM_POLICY_APPROVED:
  text: "OPA policy {policy_name} v{version} approved by {approved_by} — hot-reload initiated."
  severity: WARN
  surface: [AUDIT, NOTIFICATION]
  variables: [policy_name, version, approved_by]

PLATFORM_POLICY_RELOADED:
  text: "OPA policy {policy_name} v{version} live — all subsequent decisions use new policy."
  severity: INFO
  surface: [AUDIT]
  variables: [policy_name, version]

PLATFORM_POLICY_RELOAD_FAILED:
  text: "OPA policy {policy_name} v{version} reload failed — {error}. Previous version retained."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [policy_name, version, error]

# ── CBS connectivity ──────────────────────────────────────────────────────────
PLATFORM_CBS_UNREACHABLE:
  text: "CBS {cbs_type} unreachable for {bank_id} — degraded mode active. Balance checks deferred."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [cbs_type, bank_id]

PLATFORM_CBS_RECOVERED:
  text: "CBS {cbs_type} restored for {bank_id} after {downtime_minutes} minutes — normal processing resumed."
  severity: INFO
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [cbs_type, bank_id, downtime_minutes]

# ── Immudb audit ──────────────────────────────────────────────────────────────
PLATFORM_AUDIT_WRITE_FAILED:
  text: "Immudb write failed for event {event_type} on {instrument_id} — retrying (attempt {attempt})."
  severity: CRITICAL
  surface: [AUDIT, NOTIFICATION]
  variables: [event_type, instrument_id, attempt]

PLATFORM_AUDIT_TAMPER_DETECTED:
  text: "Immudb Merkle tree inconsistency detected in collection {collection} — security team notified."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [collection]

PLATFORM_AUDIT_INTEGRITY_VERIFIED:
  text: "Immudb integrity check passed for {collection} — {entry_count} entries verified."
  severity: INFO
  surface: [AUDIT]
  variables: [collection, entry_count]

# ── AI model drift ────────────────────────────────────────────────────────────
PLATFORM_MODEL_DRIFT_WARN:
  text: "Model {model_name} drift warning — {metric} dropped {drop_pct}% over {window_days} days."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [model_name, metric, drop_pct, window_days]

PLATFORM_MODEL_DRIFT_CRITICAL:
  text: "Model {model_name} drift critical — {metric} dropped {drop_pct}%, exceeding {threshold_pct}% threshold. Auto-tightening."
  severity: CRITICAL
  surface: [UI, NOTIFICATION]
  variables: [model_name, metric, drop_pct, threshold_pct]

PLATFORM_MODEL_PULLED:
  text: "Model {model_name} pulled from production — {metric} degraded beyond safe threshold. Human review mandatory."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [model_name, metric]

PLATFORM_MODEL_DEPLOYED:
  text: "Model {model_name} v{version} deployed — {metric} baseline: {baseline_value}."
  severity: INFO
  surface: [AUDIT]
  variables: [model_name, version, metric, baseline_value]

# ── Infrastructure ────────────────────────────────────────────────────────────
PLATFORM_DC_FAILOVER:
  text: "DC failover triggered — {failed_dc} offline, {active_dc} handling 100% traffic."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [failed_dc, active_dc]

PLATFORM_DC_RESTORED:
  text: "DC {restored_dc} back online — active-active rebalancing in progress."
  severity: INFO
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [restored_dc]

PLATFORM_VAULT_TOKEN_EXPIRING:
  text: "HashiCorp Vault token expiring in {minutes_remaining} minutes for service {service_name}."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [minutes_remaining, service_name]

PLATFORM_VAULT_TOKEN_RENEWED:
  text: "HashiCorp Vault token renewed for {service_name} — valid for {valid_hours}h."
  severity: INFO
  surface: [AUDIT]
  variables: [service_name, valid_hours]

PLATFORM_KAFKA_LAG_HIGH:
  text: "Kafka consumer lag high on topic {topic} — lag {lag_count}, consumer group {consumer_group}."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [topic, lag_count, consumer_group]

PLATFORM_SCALING_EVENT:
  text: "KEDA scaling event — {service_name} scaled from {from_pods} to {to_pods} pods. Trigger: {trigger}."
  severity: INFO
  surface: [AUDIT]
  variables: [service_name, from_pods, to_pods, trigger]
