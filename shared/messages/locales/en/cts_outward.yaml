# ── Scanner session ───────────────────────────────────────────────────────────
CTS_OUT_SCANNER_SESSION_OPENED:
  text: "Scanner session {session_id} opened by {operator} — {scanner_id} active."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [session_id, operator, scanner_id]

CTS_OUT_SCANNER_SESSION_CLOSED:
  text: "Scanner session {session_id} closed — {instrument_count} instruments captured."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [session_id, instrument_count]

CTS_OUT_SCANNER_OFFLINE:
  text: "Scanner {scanner_id} went offline — session {session_id} paused."
  severity: ERROR
  surface: [UI, NOTIFICATION]
  variables: [scanner_id, session_id]

CTS_OUT_SCANNER_JAM:
  text: "Paper jam on {scanner_id} — last captured instrument was {instrument_id}."
  severity: ERROR
  surface: [UI, NOTIFICATION]
  variables: [scanner_id, instrument_id]

# ── Image capture ─────────────────────────────────────────────────────────────
CTS_OUT_IMAGE_CAPTURED:
  text: "Front and rear images captured for {instrument_id} — quality score {quality_pct}%."
  severity: INFO
  surface: [AUDIT]
  variables: [instrument_id, quality_pct]

CTS_OUT_IMAGE_QUALITY_FAIL:
  text: "Image quality below threshold for {instrument_id} — score {quality_pct}%. Rescan required."
  severity: WARN
  surface: [UI]
  variables: [instrument_id, quality_pct]

CTS_OUT_IMAGE_SKEW_HIGH:
  text: "Excessive skew detected on {instrument_id} — {skew_degrees}°. Rescan recommended."
  severity: WARN
  surface: [UI]
  variables: [instrument_id, skew_degrees]

CTS_OUT_MICR_EXTRACTED:
  text: "MICR line extracted for {instrument_id} — IFSC {drawee_ifsc}, account {account_display}."
  severity: INFO
  surface: [AUDIT]
  variables: [instrument_id, drawee_ifsc, account_display]

CTS_OUT_MICR_UNREADABLE:
  text: "MICR line unreadable on {instrument_id} — manual entry required."
  severity: ERROR
  surface: [UI]
  variables: [instrument_id]

# ── CTS-2010 compliance (outward) ─────────────────────────────────────────────
CTS_OUT_CTS2010_PASS:
  text: "CTS-2010 compliance check passed for outward {instrument_id}."
  severity: INFO
  surface: [AUDIT]
  variables: [instrument_id]

CTS_OUT_CTS2010_FAIL:
  text: "CTS-2010 compliance failed for outward {instrument_id} — {violation_count} violations: {violations}."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id, violation_count, violations]

CTS_OUT_CTS2010_NON_CTS_FORM:
  text: "Non-CTS cheque form detected for {instrument_id} — not eligible for truncation."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

# ── Lot management ────────────────────────────────────────────────────────────
CTS_OUT_LOT_CREATED:
  text: "Lot {lot_id} created for clearing zone {zone} — {instrument_count} instruments."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [lot_id, zone, instrument_count]

CTS_OUT_LOT_INSTRUMENT_ADDED:
  text: "Instrument {instrument_id} added to lot {lot_id} — lot total: {lot_total}."
  severity: INFO
  surface: [AUDIT]
  variables: [instrument_id, lot_id, lot_total]

CTS_OUT_LOT_SEALED:
  text: "Lot {lot_id} sealed by {operator} — {instrument_count} instruments, value {total_value_range}."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [lot_id, operator, instrument_count, total_value_range]

CTS_OUT_LOT_SEAL_FAILED:
  text: "Lot {lot_id} seal failed — {reason}. Resolve before submission."
  severity: ERROR
  surface: [UI]
  variables: [lot_id, reason]

CTS_OUT_LOT_INSTRUMENT_REMOVED:
  text: "Instrument {instrument_id} removed from lot {lot_id} by {operator} — reason: {reason}."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [instrument_id, lot_id, operator, reason]

# ── Endorsement ───────────────────────────────────────────────────────────────
CTS_OUT_ENDORSEMENT_STAMPED:
  text: "Endorsement stamp applied to {instrument_id} — stamp ref {stamp_ref}."
  severity: INFO
  surface: [AUDIT]
  variables: [instrument_id, stamp_ref]

CTS_OUT_ENDORSEMENT_BATCH_COMPLETE:
  text: "Endorsement batch {lot_id} complete — {count} instruments stamped."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [lot_id, count]

CTS_OUT_ENDORSEMENT_FAILED:
  text: "Endorsement failed for {instrument_id} — {error}. Retrying."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id, error]

# ── NGCH outward submission ───────────────────────────────────────────────────
CTS_OUT_NGCH_FILE_BUILT:
  text: "NGCH presentation file built for lot {lot_id} — {instrument_count} instruments."
  severity: INFO
  surface: [AUDIT]
  variables: [lot_id, instrument_count]

CTS_OUT_NGCH_SUBMITTED:
  text: "Lot {lot_id} submitted to NGCH — acknowledgement {ngch_ack_ref}."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [lot_id, ngch_ack_ref]

CTS_OUT_NGCH_SUBMISSION_FAILED:
  text: "NGCH outward submission failed for lot {lot_id} — error {error_code}. Retrying."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [lot_id, error_code]

CTS_OUT_NGCH_SESSION_CUTOFF_MISSED:
  text: "Lot {lot_id} missed clearing session cutoff {cutoff_time} — deferred to next session."
  severity: WARN
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [lot_id, cutoff_time]

# ── RRF and reconciliation ────────────────────────────────────────────────────
CTS_OUT_RRF_GENERATED:
  text: "Return Reason File generated for session {session_id} — {return_count} returns."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [session_id, return_count]

CTS_OUT_RECONCILIATION_COMPLETE:
  text: "Session {session_id} reconciled — {matched} matched, {exceptions} exceptions, {returns} returns."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [session_id, matched, exceptions, returns]

CTS_OUT_RECONCILIATION_EXCEPTION:
  text: "Reconciliation exception on {instrument_id} — NGCH status {ngch_status} vs local {local_status}."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [instrument_id, ngch_status, local_status]
