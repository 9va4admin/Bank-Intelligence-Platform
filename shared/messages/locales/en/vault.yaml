# ── Signature vault ───────────────────────────────────────────────────────────
VAULT_SIG_HIT:
  text: "Signature vault hit for {account_display} — specimen found, verification proceeding."
  severity: INFO
  surface: [AUDIT]
  variables: [account_display]

VAULT_SIG_MISS:
  text: "Signature vault miss for {account_display} — no specimen on record. {instrument_id} to human review."
  severity: WARN
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [account_display, instrument_id]

VAULT_SIG_STALE:
  text: "Signature vault stale for {bank_id} — last sync {hours_ago}h ago. All inward cheques to human review."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [bank_id, hours_ago]

VAULT_SIG_LOAD_COMPLETE:
  text: "Signature vault loaded for {bank_id} — {count} specimens ready."
  severity: INFO
  surface: [AUDIT]
  variables: [bank_id, count]

VAULT_SIG_LOAD_FAILED:
  text: "Signature vault load failed for {bank_id} — {error}. Existing data retained."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [bank_id, error]

VAULT_SIG_SPECIMEN_UPDATED:
  text: "Signature specimen updated for {account_display} by vault sync — previous version archived."
  severity: INFO
  surface: [AUDIT]
  variables: [account_display]

VAULT_SIG_SPECIMEN_REVOKED:
  text: "Signature specimen revoked for {account_display} — subsequent cheques will route to human review."
  severity: WARN
  surface: [AUDIT, NOTIFICATION]
  variables: [account_display]

VAULT_SIG_MULTI_SIGNATORY:
  text: "Multi-signatory account {account_display} — {required_sigs} signatures required, {found_sigs} detected."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [account_display, required_sigs, found_sigs]

VAULT_SIG_INTEGRITY_FAIL:
  text: "Signature vault integrity check failed for {bank_id} — {corrupt_count} entries corrupted. Resync required."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [bank_id, corrupt_count]

# ── PPS (Positive Pay System) vault ──────────────────────────────────────────
VAULT_PPS_HIT:
  text: "PPS vault hit for {account_display} — cheque series {cheque_series} registered."
  severity: INFO
  surface: [AUDIT]
  variables: [account_display, cheque_series]

VAULT_PPS_MISS:
  text: "No PPS record for {account_display} / {instrument_id} — routed to human review."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [account_display, instrument_id]

VAULT_PPS_AMOUNT_MISMATCH:
  text: "PPS amount mismatch on {instrument_id} — registered {expected_range}, presented {presented_range}."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [instrument_id, expected_range, presented_range]

VAULT_PPS_SERIES_MISMATCH:
  text: "PPS series mismatch on {instrument_id} — presented series {presented_series} not registered."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [instrument_id, presented_series]

VAULT_PPS_PAYEE_MISMATCH:
  text: "PPS payee mismatch on {instrument_id} — registered payee differs from instrument."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [instrument_id]

VAULT_PPS_LOAD_COMPLETE:
  text: "PPS vault loaded for {bank_id} — {count} entries ready."
  severity: INFO
  surface: [AUDIT]
  variables: [bank_id, count]

VAULT_PPS_LOAD_FAILED:
  text: "PPS vault load failed for {bank_id} — {error}. Existing data retained."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [bank_id, error]

VAULT_PPS_ENTRY_EXPIRED:
  text: "PPS entry expired for {account_display} cheque series {cheque_series} — no longer valid."
  severity: WARN
  surface: [AUDIT]
  variables: [account_display, cheque_series]

# ── Combined sync ─────────────────────────────────────────────────────────────
VAULT_SYNC_COMPLETE:
  text: "Vault sync complete for {bank_id} — signatures: {sig_count}, PPS entries: {pps_count}."
  severity: INFO
  surface: [AUDIT]
  variables: [bank_id, sig_count, pps_count]

VAULT_SYNC_FAILED:
  text: "Vault sync failed for {bank_id} — error: {error_code}. Retaining existing vault data."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [bank_id, error_code]
