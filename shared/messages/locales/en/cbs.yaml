# CBS connector — balance, account status, stop payment, vault sync
CBS_BALANCE_CHECK_OK:
  text: "Balance check passed for {account_display} — {instrument_id} proceeds."
  severity: INFO
  surface: [AUDIT]
  variables: [account_display, instrument_id]

CBS_BALANCE_INSUFFICIENT:
  text: "Insufficient balance for {account_display} — {instrument_id} cannot be honoured."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [account_display, instrument_id]

CBS_ACCOUNT_NOT_FOUND:
  text: "Account {account_display} not found in CBS {cbs_type} — {instrument_id} to human review."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [account_display, cbs_type, instrument_id]

CBS_ACCOUNT_FROZEN:
  text: "Account {account_display} is frozen in CBS — {instrument_id} returned immediately."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [account_display, instrument_id]

CBS_ACCOUNT_CLOSED:
  text: "Account {account_display} is closed in CBS — {instrument_id} returned immediately."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [account_display, instrument_id]

CBS_ACCOUNT_DORMANT:
  text: "Account {account_display} is dormant in CBS — {instrument_id} routed to human review."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [account_display, instrument_id]

CBS_ACCOUNT_LIEN_MARKED:
  text: "Lien marked on {account_display} — {instrument_id} routed to human review for manual balance verification."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [account_display, instrument_id]

CBS_STOP_PAYMENT_ACTIVE:
  text: "Stop payment instruction active for {instrument_id} on {account_display} — returned immediately."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [instrument_id, account_display]

CBS_STOP_PAYMENT_CLEAR:
  text: "No stop payment on record for {instrument_id} / {account_display}."
  severity: INFO
  surface: [AUDIT]
  variables: [instrument_id, account_display]

CBS_UNREACHABLE:
  text: "CBS {cbs_type} unreachable for {bank_id} — timeout after {timeout_seconds}s. Degraded path active."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [cbs_type, bank_id, timeout_seconds]

CBS_RECOVERED:
  text: "CBS {cbs_type} connection restored for {bank_id} after {downtime_minutes} minutes."
  severity: INFO
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [cbs_type, bank_id, downtime_minutes]

CBS_RESPONSE_TIMEOUT:
  text: "CBS {cbs_type} response timeout for {bank_id} on query type {query_type} — attempt {attempt}."
  severity: WARN
  surface: [AUDIT]
  variables: [cbs_type, bank_id, query_type, attempt]

CBS_AUTH_FAILED:
  text: "CBS {cbs_type} authentication failure for {bank_id} — credentials may be stale."
  severity: CRITICAL
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [cbs_type, bank_id]

CBS_VAULT_SYNC_STARTED:
  text: "CBS vault sync started for {bank_id} — fetching signatures and PPS from {cbs_type}."
  severity: INFO
  surface: [AUDIT]
  variables: [bank_id, cbs_type]

CBS_VAULT_SYNC_COMPLETE:
  text: "CBS vault sync complete for {bank_id} — {sig_count} signatures, {pps_count} PPS entries loaded."
  severity: INFO
  surface: [AUDIT]
  variables: [bank_id, sig_count, pps_count]

CBS_VAULT_SYNC_FAILED:
  text: "CBS vault sync failed for {bank_id} — error: {error_code}. Retaining existing vault data."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [bank_id, error_code]

CBS_VAULT_PARTIAL_SYNC:
  text: "CBS vault partial sync for {bank_id} — {loaded_count} of {total_count} accounts synced. {failed_count} failures."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [bank_id, loaded_count, total_count, failed_count]
