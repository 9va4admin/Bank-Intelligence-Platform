# ── Ingestion ─────────────────────────────────────────────────────────────────
EJ_LOG_INGESTED:
  text: "EJ log received from ATM {atm_id} — {transaction_count} transactions, {size_kb}KB."
  severity: INFO
  surface: [AUDIT]
  variables: [atm_id, transaction_count, size_kb]

EJ_LOG_DUPLICATE:
  text: "Duplicate EJ log rejected from ATM {atm_id} — hash {file_hash} already ingested."
  severity: WARN
  surface: [AUDIT]
  variables: [atm_id, file_hash]

EJ_LOG_CORRUPT:
  text: "Corrupt EJ log from ATM {atm_id} — AES-GCM integrity check failed."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [atm_id]

EJ_EDGE_BUFFER_HIGH:
  text: "Edge buffer for ATM {atm_id} at {buffer_pct}% capacity — central connectivity may be degraded."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [atm_id, buffer_pct]

EJ_EDGE_BUFFER_FULL:
  text: "Edge buffer full for ATM {atm_id} — oldest logs being overwritten. Immediate connectivity check required."
  severity: CRITICAL
  surface: [UI, NOTIFICATION]
  variables: [atm_id]

# ── OEM fingerprinting ────────────────────────────────────────────────────────
EJ_OEM_DETECTED:
  text: "OEM fingerprint detected for ATM {atm_id} — manufacturer: {oem}, format version: {format_version}."
  severity: INFO
  surface: [AUDIT]
  variables: [atm_id, oem, format_version]

EJ_OEM_UNKNOWN:
  text: "Unknown OEM format from ATM {atm_id} — fingerprint score {score}. Manual OEM classification required."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [atm_id, score]

EJ_OEM_FORMAT_CHANGED:
  text: "OEM format change detected on ATM {atm_id} — was {old_format}, now {new_format}. Parser may need update."
  severity: WARN
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [atm_id, old_format, new_format]

# ── LLM parsing ───────────────────────────────────────────────────────────────
EJ_PARSE_COMPLETE:
  text: "EJ normalisation complete for ATM {atm_id} — {parsed_count} records extracted."
  severity: INFO
  surface: [AUDIT]
  variables: [atm_id, parsed_count]

EJ_PARSE_LOW_CONFIDENCE:
  text: "EJ low-confidence extraction for ATM {atm_id} — {low_count} of {total_count} fields below threshold."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [atm_id, low_count, total_count]

EJ_PARSE_FAILED:
  text: "EJ parsing failed for ATM {atm_id} — {failed_count} records could not be normalised."
  severity: ERROR
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [atm_id, failed_count]

EJ_PARSE_MODEL_UNAVAILABLE:
  text: "LLM unavailable for EJ parsing — ATM {atm_id} log queued for retry."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [atm_id]

EJ_CANONICAL_STORED:
  text: "EJ canonical record stored for ATM {atm_id} — hash {canonical_hash}, {record_count} transactions."
  severity: INFO
  surface: [AUDIT]
  variables: [atm_id, canonical_hash, record_count]

# ── Schema validation ─────────────────────────────────────────────────────────
EJ_SCHEMA_VALID:
  text: "EJ canonical schema validation passed for ATM {atm_id} — all required fields present."
  severity: INFO
  surface: [AUDIT]
  variables: [atm_id]

EJ_SCHEMA_INVALID:
  text: "EJ canonical schema validation failed for ATM {atm_id} — missing fields: {missing_fields}."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [atm_id, missing_fields]

# ── Dispute resolution ────────────────────────────────────────────────────────
EJ_DISPUTE_RECEIVED:
  text: "Dispute claim {claim_id} received from {source} for ATM {atm_id} — amount {amount_range}."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [claim_id, source, atm_id, amount_range]

EJ_DISPUTE_MATCHED:
  text: "Dispute {claim_id} matched to EJ record for ATM {atm_id} — confidence {confidence_pct}%."
  severity: INFO
  surface: [UI, AUDIT]
  variables: [claim_id, atm_id, confidence_pct]

EJ_DISPUTE_NO_MATCH:
  text: "Dispute {claim_id} for ATM {atm_id} — no EJ record match found. Escalated for manual review."
  severity: WARN
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [claim_id, atm_id]

EJ_DISPUTE_AUTO_RESOLVED:
  text: "Dispute {claim_id} auto-resolved — {resolution}. Evidence package filed."
  severity: INFO
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [claim_id, resolution]

EJ_DISPUTE_ESCALATED:
  text: "Dispute {claim_id} escalated to human review — reason: {escalation_reason}."
  severity: WARN
  surface: [UI, AUDIT, NOTIFICATION]
  variables: [claim_id, escalation_reason]

EJ_DISPUTE_CCTV_REQUESTED:
  text: "CCTV evidence requested for dispute {claim_id} — ATM {atm_id}, window {time_window}."
  severity: INFO
  surface: [AUDIT]
  variables: [claim_id, atm_id, time_window]

EJ_DISPUTE_CCTV_RETRIEVED:
  text: "CCTV clip retrieved for dispute {claim_id} — {clip_duration}s clip stored at {object_key}."
  severity: INFO
  surface: [AUDIT]
  variables: [claim_id, clip_duration, object_key]

EJ_DISPUTE_CCTV_UNAVAILABLE:
  text: "CCTV unavailable for dispute {claim_id} — ATM {atm_id} camera {camera_id} offline or clip overwritten."
  severity: WARN
  surface: [UI, AUDIT]
  variables: [claim_id, atm_id, camera_id]

# ── ATM health ────────────────────────────────────────────────────────────────
EJ_ATM_HEALTH_HEALTHY:
  text: "ATM {atm_id} health check passed — all metrics within normal range."
  severity: INFO
  surface: [AUDIT]
  variables: [atm_id]

EJ_ATM_HEALTH_DEGRADED:
  text: "ATM {atm_id} health degraded — {anomaly_type} detected. Predictive alert issued."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [atm_id, anomaly_type]

EJ_ATM_HEALTH_CRITICAL:
  text: "ATM {atm_id} in critical state — {fault_description}. Immediate attention required."
  severity: CRITICAL
  surface: [UI, NOTIFICATION]
  variables: [atm_id, fault_description]

EJ_ATM_CASH_LOW:
  text: "ATM {atm_id} cash level low — {remaining_notes} notes remaining across {denomination_count} denominations."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [atm_id, remaining_notes, denomination_count]

EJ_ATM_DISPENSE_FAILURE_RATE_HIGH:
  text: "ATM {atm_id} dispense failure rate at {failure_rate_pct}% over last {window_hours}h — hardware check recommended."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [atm_id, failure_rate_pct, window_hours]

EJ_ATM_OFFLINE:
  text: "ATM {atm_id} has been offline for {offline_hours}h — last log received {last_log_time}."
  severity: ERROR
  surface: [UI, NOTIFICATION]
  variables: [atm_id, offline_hours, last_log_time]

EJ_ATM_PREDICTED_FAILURE:
  text: "Predictive model indicates ATM {atm_id} may fail within {predicted_hours}h — maintenance recommended."
  severity: WARN
  surface: [UI, NOTIFICATION]
  variables: [atm_id, predicted_hours]
