# CTS-2010 standard violation codes — each violation is a distinct message
CTS_COMP_BANK_LOGO_MISSING:
  text: "CTS-2010 violation on {instrument_id}: bank logo absent or non-UV-reactive."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_WATERMARK_MISSING:
  text: "CTS-2010 violation on {instrument_id}: CTS-INDIA watermark absent."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_VOID_PANTOGRAPH_MISSING:
  text: "CTS-2010 violation on {instrument_id}: VOID pantograph not present."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_IFSC_MISSING:
  text: "CTS-2010 violation on {instrument_id}: IFSC code absent or unreadable."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_MICR_BAND_INVALID:
  text: "CTS-2010 violation on {instrument_id}: MICR band position or dimensions non-compliant."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_IMAGE_RESOLUTION_LOW:
  text: "CTS-2010 violation on {instrument_id}: image resolution {actual_dpi} DPI below required 200 DPI."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id, actual_dpi]

CTS_COMP_IMAGE_COLOUR_INVALID:
  text: "CTS-2010 violation on {instrument_id}: front image must be colour (24-bit), rear greyscale."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_INSTRUMENT_SIZE_INVALID:
  text: "CTS-2010 violation on {instrument_id}: physical dimensions {actual_dimensions} outside standard range."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id, actual_dimensions]

CTS_COMP_POST_DATED:
  text: "Instrument {instrument_id} is post-dated — cheque date {cheque_date} is in the future."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id, cheque_date]

CTS_COMP_STALE_DATED:
  text: "Instrument {instrument_id} stale — cheque date {cheque_date} exceeds {validity_days}-day validity."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id, cheque_date, validity_days]

CTS_COMP_AMOUNT_WORDS_BLANK:
  text: "CTS-2010 violation on {instrument_id}: amount in words is blank."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_PAYEE_BLANK:
  text: "CTS-2010 violation on {instrument_id}: payee name is blank."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]

CTS_COMP_DRAWEE_BANK_MISMATCH:
  text: "CTS-2010 violation on {instrument_id}: drawee IFSC {micr_ifsc} does not match image bank {image_bank}."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id, micr_ifsc, image_bank]

CTS_COMP_EXCESSIVE_DAMAGE:
  text: "Instrument {instrument_id} rejected — physical damage exceeds acceptable threshold for truncation."
  severity: ERROR
  surface: [UI, AUDIT]
  variables: [instrument_id]
