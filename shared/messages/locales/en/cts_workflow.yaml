  surface: [UI, AUDIT]
  variables: [instrument_id, bank]

CTS_WF_CHEQUE_DUPLICATE:
  text: "Duplicate instrument {instrument_id} rejected — already processed in session {session_id}."
  severity: WARN
  surface: [UI, AUDIT]
