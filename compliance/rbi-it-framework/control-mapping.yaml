---
# RBI IT Framework Control Mapping — ASTRA Platform
# Reference: RBI Master Direction on IT Governance, Risk, Controls and Assurance Practices (Apr 2024)
# Reference: RBI Circular on Cheque Truncation System — IET mandate (Jan 2026)
# Reference: RBI Guidelines on Information Security, Electronic Banking (Jun 2011 + amendments)
#
# STATUS: COMPLIANT | PARTIAL | PLANNED | N/A
# EVIDENCE: file path or external reference for audit artefacts

metadata:
  document_version: "1.0"
  effective_date: "2026-06-24"
  framework: "RBI IT Governance Framework 2024"
  platform: "ASTRA — Automated Settlement and Transaction Recognition Architecture"
  modules: ["CTS", "EJ", "PLATFORM"]
  maintained_by: "compliance_officer"
  next_review: "2026-12-01"

# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN 1: IT Governance
# ─────────────────────────────────────────────────────────────────────────────
domain_1_it_governance:

  - control_id: ITG-01
    title: IT Strategy and Board Oversight
    rbi_section: "Chapter I, Para 3"
    requirement: "Board-approved IT strategy aligned with business objectives"
    status: COMPLIANT
    implementation: |
      ASTRA is sold as a strategic AI platform for RBI-mandated CTS IET compliance.
      Each bank's board approves the IT strategy that includes ASTRA adoption.
      ASTRA vendor provides: architecture documentation, SLA commitments, and audit
      artefacts to support board reporting.
    evidence:
      - "CLAUDE.md §0 — Platform Identity and Business Context"
      - "infra/helm/values/banks/{bank_id}/platform.yaml — bank-specific deployment approval"

  - control_id: ITG-02
    title: IT Risk Management Framework
    rbi_section: "Chapter I, Para 5"
    requirement: "Formal IT risk management framework with documented risk appetite"
    status: COMPLIANT
    implementation: |
      IET breach risk: 0.000% tolerance (hard limit, not configurable).
      Fraud false negative: < 1.0% tolerance.
      Module blast isolation ensures CTS risk never cascades to EJ.
      Graceful degradation hierarchy: LLM down → rule-based → human review → never IET breach.
    evidence:
      - "CLAUDE.md §12 — NFR Summary (Engineering Constitution)"
      - "CLAUDE.md §2.5 — Module Blast Isolation"
      - "modules/cts/workflows/atm_health_workflow.py — risk threshold enforcement"

  - control_id: ITG-03
    title: Change Management
    rbi_section: "Chapter III, Para 14"
    requirement: "Formal change management with approval, testing, rollback capability"
    status: COMPLIANT
    implementation: |
      GitOps pull model: all changes go through PR → CI → ArgoCD sync.
      Layer 2 changes (topology): require bank IT Admin PR approval.
      Layer 3 changes (business rules): maker-checker via Admin UI, Immudb audit trail.
      Layer 4 changes (OPA Rego): compliance_officer author + bank IT admin approval.
      Helm pre-upgrade hook runs Alembic dry-run before any production migration.
      Rollback: ArgoCD targetRevision revert + Alembic downgrade — complete in < 10 minutes.
    evidence:
      - "CLAUDE.md §2.6 — Upgrade Process"
      - "infra/helm/astra-platform/hooks/post-upgrade.yaml"
      - ".claude/rules/cicd.md — pipeline stages"

# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN 2: Information Security
# ─────────────────────────────────────────────────────────────────────────────
domain_2_information_security:

  - control_id: IS-01
    title: Data Classification and Protection
    rbi_section: "Chapter IV, Para 18"
    requirement: "Data classification with appropriate protection controls per sensitivity"
    status: COMPLIANT
    implementation: |
      PII fields (account numbers, customer names, cheque amounts):
        - Account numbers: HMAC-SHA256 hashed, never stored raw
        - Customer names: pgcrypto column-level encryption (AES-256)
        - Amounts: stored as range buckets only (STANDARD/HIGH_VALUE/VERY_HIGH_VALUE)
        - Cheque images: MinIO SSE-KMS (Vault transit engine)
        - EJ raw logs: AES-256-GCM at edge, gzip compressed before transmission
      Non-PII operational data: stored plaintext in YugabyteDB
    evidence:
      - ".claude/rules/pii-data-protection.md"
      - "shared/utils/masking.py"
      - "shared/crypto/pii_cipher.py"
      - "edge/ej-agent/compressor.go — AES-256-GCM implementation"

  - control_id: IS-02
    title: Access Control — Least Privilege
    rbi_section: "Chapter IV, Para 19"
    requirement: "Role-based access with least-privilege principle; no shared credentials"
    status: COMPLIANT
    implementation: |
      7 named roles: ops_reviewer, fraud_analyst, ops_manager, bank_it_admin,
      compliance_officer, rbi_examiner, ml_engineer.
      ABAC on top: ops_reviewer scoped to clearing_zone; all roles scoped to bank_id.
      rbi_examiner: time-limited, date-scoped access (per audit engagement).
      No shared passwords: bank's IdP via SAML 2.0 — ASTRA never stores passwords.
      Service accounts: Vault dynamic secrets, rotated every 24 hours.
    evidence:
      - "CLAUDE.md §6 — User Roles (RBAC)"
      - "shared/auth/rbac.py"
      - "shared/auth/saml_handler.py"
      - ".claude/rules/secrets-vault.md"

  - control_id: IS-03
    title: Encryption in Transit and at Rest
    rbi_section: "Chapter IV, Para 20"
    requirement: "AES-256 at rest, TLS 1.3 in transit; no plaintext sensitive data"
    status: COMPLIANT
    implementation: |
      In transit: TLS 1.3 minimum enforced by Helm chart Layer 1 (non-overridable).
                  mTLS across all pods via Istio service mesh.
                  Edge agent MCP server: TLS 1.3 with mutual certificate auth.
      At rest: MinIO SSE-KMS for all object storage (cheque images, EJ logs, CCTV).
               YugabyteDB: column-level pgcrypto encryption for PII fields.
               Redis: auth token + TLS in transit; data encrypted at OS level (LUKS).
               Immudb: Merkle-tree protected; tamper-evident by design.
    evidence:
      - "edge/ej-agent/mcp_server.go — TLS 1.3 + mTLS enforcement"
      - "infra/helm/astra-platform/values.yaml — min_tls_version: '1.3'"
      - "CLAUDE.md §11 — Security Principles"

  - control_id: IS-04
    title: Vulnerability Management and Patching
    rbi_section: "Chapter IV, Para 22"
    requirement: "Regular vulnerability scans; CRITICAL CVEs patched within 30 days"
    status: COMPLIANT
    implementation: |
      CI pipeline: Trivy scans all Docker base images on every PR (CRITICAL = block).
      OWASP Dependency Check: Python packages + Go modules on every PR (CVSS ≥ 7 = block).
      checkov: IaC security scan (Helm, K8s manifests) on every PR.
      Semgrep SAST: ASTRA-custom rules for banking-specific patterns.
      Release gate: DAST (OWASP ZAP) on staging before chart publish.
    evidence:
      - ".gitlab-ci.yml — trivy-images, owasp-dependency-check, semgrep-sast stages"
      - ".claude/rules/security-scanning.md"
      - "infra/ci-checks/semgrep-astra.yaml"

  - control_id: IS-05
    title: Key Management and HSM
    rbi_section: "Chapter IV, Para 21"
    requirement: "FIPS 140-2 Level 3 HSM for cryptographic key custody; no software keys for PKI"
    status: COMPLIANT
    implementation: |
      HSM (FIPS 140-2 Level 3) used for:
        - NGCH PKI signing: all NGCH submissions signed with HSM-held key
        - Immudb audit event signing: every AuditEvent HSM-signed before write
        - Vault transit engine: HSM-backed key derivation for MinIO SSE-KMS
      HashiCorp Vault: manages dynamic secrets (DB passwords, Redis tokens), rotated 24h.
      No software-held private keys in application code (Semgrep enforces this).
    evidence:
      - "shared/audit/audit_event.py — HSM signing integration"
      - "CLAUDE.md §3 — Technology Stack (HSM: FIPS 140-2 Level 3)"
      - ".claude/rules/security.md — HSM for All PKI"

# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN 3: Business Continuity and Disaster Recovery
# ─────────────────────────────────────────────────────────────────────────────
domain_3_bcp_dr:

  - control_id: DR-01
    title: Recovery Time and Point Objectives
    rbi_section: "Chapter V, Para 26"
    requirement: "Documented and tested RTO/RPO for critical banking applications"
    status: COMPLIANT
    implementation: |
      RPO = 0 (active-active across 2 DCs; Kafka MirrorMaker 2 bidirectional replication).
      RTO < 30 seconds (DC failure: automatic failover via Kubernetes + Istio traffic routing).
      CTS during clearing hours (10AM–4PM): 99.999% SLA.
      CTS outside clearing: 99.99% SLA.
      EJ module: 99.9% SLA (non-critical path for IET).
    evidence:
      - "CLAUDE.md §2.1 — Deployment Model (Active-Active)"
      - "CLAUDE.md §12 — NFR Summary"
      - "infra/helm/astra-platform/ — multi-DC Helm values"

  - control_id: DR-02
    title: Business Continuity Testing
    rbi_section: "Chapter V, Para 27"
    requirement: "Annual DR drill with documented results; RTO/RPO validated"
    status: PLANNED
    implementation: |
      Chaos Mesh scenarios planned for Phase 5 hardening:
        - DC1 complete failure → DC2 takes 100% traffic
        - Redis CTS cluster node failure → vault miss handling
        - vLLM GPU node failure → graceful degradation to human review
        - Kafka broker failure → MirrorMaker2 failover
      DR drill schedule: quarterly, documented in incident runbooks.
    evidence:
      - "CLAUDE.md §16 — Build Status (Phase 5: Chaos Mesh)"
      - "[PLANNED] infra/chaos-mesh/ — scenario YAMLs"

  - control_id: DR-03
    title: Data Backup and Retention
    rbi_section: "Chapter V, Para 28"
    requirement: "Regular backups; 10-year retention for financial records"
    status: COMPLIANT
    implementation: |
      Tier 1 (hot, 0–90 days): MinIO hot bucket, active YugabyteDB partitions.
      Tier 2 (warm, 91 days–2 years): MinIO warm bucket, auto-transitioned via ILM.
      Tier 3 (cold/WORM, 2–10 years): MinIO COMPLIANCE mode, object lock enabled.
      Immudb: cryptographic append-only; Merkle proof for every audit event.
      Air-gapped DC3: cold backup site, not serving traffic.
    evidence:
      - "CLAUDE.md §10 — Storage Tiers and Lifecycle"
      - "infra/helm/astra-platform/ — MinIO WORM + ILM configuration"

# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN 4: Audit Trail and Forensics
# ─────────────────────────────────────────────────────────────────────────────
domain_4_audit:

  - control_id: AUD-01
    title: Comprehensive Audit Trail
    rbi_section: "Chapter VI, Para 32"
    requirement: "All critical transactions logged with tamper-evident audit trail"
    status: COMPLIANT
    implementation: |
      Every YugabyteDB write → Immudb AuditEvent (Merkle-tree protected, HSM-signed).
      Kafka topic `platform.audit.events` → Temporal AuditWriteWorkflow → Immudb + MinIO WORM.
      AuditEvent schema: {event_type, bank_id, instrument_id, actor, action,
        before_state, after_state, timestamp, hsm_signature, merkle_proof}.
      Config changes (Layer 3): ConfigChangeEvent written to Immudb BEFORE taking effect.
      Diagnostic MCP access: DiagnosticAccessEvent logged to Immudb per tool call.
    evidence:
      - "shared/audit/audit_event.py"
      - "shared/audit/immudb_client.py"
      - ".claude/rules/diagnostic-mcp.md — Immudb audit record structure"

  - control_id: AUD-02
    title: RBI Examiner Access
    rbi_section: "Chapter VI, Para 33"
    requirement: "Auditors and regulators must have read-only access to audit records"
    status: COMPLIANT
    implementation: |
      Role: rbi_examiner — read-only, time-limited, date-scoped per audit engagement.
      Access provisioned by bank_it_admin via Admin UI; scope defined per engagement.
      Immudb verification: examiners can verify Merkle proofs without trusting ASTRA.
      Standard audit query reports: compliance/audit-queries/standard-reports.sql
    evidence:
      - "CLAUDE.md §6 — rbi_examiner role"
      - "compliance/audit-queries/standard-reports.sql"
      - "shared/auth/rbac.py — rbi_examiner role definition"

  - control_id: AUD-03
    title: Non-Repudiation
    rbi_section: "Chapter VI, Para 34"
    requirement: "NGCH submissions must be non-repudiable; signed evidence for disputes"
    status: COMPLIANT
    implementation: |
      Every NGCH submission: HSM-signed → Immudb write → MinIO WORM copy.
      Dispute evidence package: EJ canonical hash + CCTV clip MinIO reference + NPCI claim ID.
      Temporal workflow ID is deterministic (cts-{bank_id}-{instrument_id}) — idempotent,
      exactly-once, no duplicate NGCH submissions ever.
    evidence:
      - "modules/cts/workflows/activities/ngch_filer.py"
      - "modules/ej/workflows/dispute_workflow.py"
      - ".claude/rules/temporal.md — exactly-once guarantee"

# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN 5: AI/ML Model Governance (Emerging — RBI AI Framework 2024)
# ─────────────────────────────────────────────────────────────────────────────
domain_5_ai_governance:

  - control_id: AI-01
    title: Explainable AI Decisions
    rbi_section: "RBI AI Framework 2024, Para 8"
    requirement: "AI-driven financial decisions must be explainable; no black-box approvals"
    status: COMPLIANT
    implementation: |
      Every CTS fraud scoring decision: SHAP values computed and stored alongside score.
      Human-readable rationale: Llama 3.3 70B synthesises natural-language explanation.
      SHAP values stored in AgentDecision before any NGCH filing — enforced by code review.
      ops_reviewer sees: fraud score + top-3 SHAP features + human rationale in review UI.
    evidence:
      - "modules/cts/workflows/activities/fraud.py — SHAP computation"
      - ".claude/rules/ai-inference.md — SHAP Requirement (Non-Negotiable)"
      - "apps/web/src/modules/cts/ — SHAP panel in human review UI"

  - control_id: AI-02
    title: Model Risk Management
    rbi_section: "RBI AI Framework 2024, Para 10"
    requirement: "Model validation, monitoring, and drift detection with intervention thresholds"
    status: COMPLIANT
    implementation: |
      Drift monitoring: Prometheus metrics per model (7-day rolling baseline).
      Alert thresholds (infra/k8s/monitoring/prometheus-rules.yaml):
        - OCR accuracy drift > 2% → warning
        - Fraud F1 < 0.92 → CRITICAL (pull from production)
        - Fraud FP rate > 3% → warning
      Model registry: MLflow (on-prem) — full version, lineage, deployment history.
      Graceful degradation: model down → rule-based → human review (never auto-approve on failure).
    evidence:
      - "infra/k8s/monitoring/prometheus-rules.yaml — CTSFraudF1Drop, CTSOCRAccuracyDrift"
      - "CLAUDE.md §12 — AI Model Thresholds"
      - ".claude/rules/ai-inference.md — Graceful Degradation When GPU / vLLM Is Down"

  - control_id: AI-03
    title: Data Localisation for AI Training
    rbi_section: "RBI Data Localisation Directive"
    requirement: "Indian financial data must not leave Indian servers for AI processing"
    status: COMPLIANT
    implementation: |
      All AI inference: on-premises vLLM (no cloud AI APIs — OpenAI, Anthropic, etc.).
      Semgrep rule blocks any import of cloud AI SDKs in modules/ or shared/.
      Edge agent (Go binary): compresses + encrypts EJ logs before any transmission;
        raw data never leaves branch unencrypted.
      Zero cloud dependencies by design (CLAUDE.md §2.1 — all on-premises).
    evidence:
      - "CLAUDE.md §2.1 — Deployment Model (all on-premises)"
      - ".claude/rules/ai-inference.md — Forbidden Patterns (cloud LLM APIs)"
      - "edge/ej-agent/compressor.go — AES-256-GCM before transmission"

# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN 6: CTS-Specific Compliance (IET Mandate)
# ─────────────────────────────────────────────────────────────────────────────
domain_6_cts_iet:

  - control_id: CTS-01
    title: IET Compliance — Zero Breach Rate
    rbi_section: "RBI CTS Circular (Jan 2026) — Item Expiry Time mandate"
    requirement: "No cheque must expire past IET without a NGCH decision being filed"
    status: COMPLIANT
    implementation: |
      IETWatchdogWorkflow: spawned as first child before any CTS activity.
      parent_close_policy = ABANDON — watchdog survives parent workflow failure.
      Emergency filing at T-30s: watchdog files directly to NGCH if parent not done.
      IET breach rate configured as 0.000% in Layer 1 (Helm chart — non-overridable).
      PrometheusRule CTSIETBreach: fires immediately (for: 0s) on any breach.
    evidence:
      - "modules/cts/workflows/atm_health_workflow.py — IETWatchdogWorkflow"
      - "infra/k8s/monitoring/prometheus-rules.yaml — CTSIETBreach (for: 0s)"
      - ".claude/rules/temporal.md — IET Watchdog Pattern"
      - ".claude/rules/cts.md — IET breach rate 0.000%"

  - control_id: CTS-02
    title: CTS2010 Image Quality Standards
    rbi_section: "RBI CTS2010 Standard Specification"
    requirement: "All presented cheques must meet CTS2010 image quality specifications"
    status: COMPLIANT
    implementation: |
      CTSImageQuality page: real-time image quality scoring per cheque.
      GOT-OCR2.0: validates MICR line integrity and cheque layout conformance.
      Qwen2-VL 72B: detects alterations, poor scan quality, missing required fields.
      STP_RETURN route available for CTS2010 non-compliant images.
    evidence:
      - "apps/web/src/modules/cts/pages/CTSImageQuality.jsx"
      - "modules/cts/workflows/activities/ocr.py"

  - control_id: CTS-03
    title: Exactly-Once NGCH Submission
    rbi_section: "RBI CTS Operational Guidelines"
    requirement: "No duplicate NGCH filings; each instrument submitted exactly once"
    status: COMPLIANT
    implementation: |
      Temporal workflow IDs are deterministic: cts-{bank_id}-{instrument_id}.
      Temporal idempotency: submitting same workflow_id twice → Temporal deduplicates.
      ngch_filer activity: non_retryable_error_types includes DuplicateFilingError.
      IETWatchdogWorkflow checks parent filing state before emergency filing.
    evidence:
      - "modules/cts/workflows/activities/ngch_filer.py"
      - ".claude/rules/temporal.md — Workflow ID Patterns (Idempotency)"

  - control_id: CTS-04
    title: Sub-Member / Sponsor Bank Routing
    rbi_section: "RBI CTS Sub-Membership Guidelines"
    requirement: "Sub-member banks must route through sponsor banks for NGCH clearing"
    status: COMPLIANT
    implementation: |
      CTSSubMember page: full sub-member management, sponsor routing configuration.
      Sponsor bank risk shield: configurable liability caps per sub-member.
      Sub-member cheques routed through sponsor IFSC for NGCH filing.
      MCP ngch_adapter: handles sponsor-bank routing at the filing layer.
    evidence:
      - "apps/web/src/modules/cts/pages/CTSSubMember.jsx"
      - "modules/cts/mcp/ngch_adapter.py"

# ─────────────────────────────────────────────────────────────────────────────
# COMPLIANCE SUMMARY
# ─────────────────────────────────────────────────────────────────────────────
  # ── SMB (Sub-Member Bank) Routing Controls ───────────────────────────────
  - control_id: CTS-SMB-01
    title: Sub-Member Bank IET Safety
    rbi_section: "RBI CTS IET Circular — Jan 2026, Para 4"
    requirement: >
      Sponsor banks routing CTS on behalf of sub-members must ensure IET
      compliance is maintained for all instruments regardless of routing path.
    status: COMPLIANT
    implementation: |
      SMBForwardingWorkflow validates IET headroom (min 300s) before routing.
      IETWatchdogWorkflow runs at sponsor bank level — covers all instruments
      including those routed from sub-members. SMB instruments get the same
      T-30s emergency filing guarantee as direct instruments.
      IET headroom threshold: config_service.get("cts.smb.min_iet_headroom_s")
    evidence:
      - "modules/cts/workflows/smb_forwarding_workflow.py"
      - "modules/cts/workflows/activities/smb_forwarding_activities.py"
      - "tests/modules/cts/workflows/activities/test_smb_forwarding_activities.py"

  - control_id: CTS-SMB-02
    title: Sub-Member Return Rate Monitoring
    rbi_section: "RBI Cheque Return Norms — Circular DPSS.CO.CHD.1380/04.07.05/2018-19"
    requirement: >
      Banks must monitor and control cheque return rates. Excessive returns
      indicate fraud or process failure and must trigger escalation.
    status: COMPLIANT
    implementation: |
      ReturnRateShield per SMB: SOFT_HOLD (warning) at configurable threshold,
      HARD_STOP (block forwarding) at second threshold. All thresholds via
      config_service (Layer 3 — ops_manager + bank_it_admin maker-checker).
      Shield status visible in CTSSMBRegistry frontend and logged to Immudb.
    evidence:
      - "modules/cts/sub_member/risk_shield.py"
      - "apps/web/src/modules/cts/pages/CTSSMBRegistry.jsx"

  - control_id: CTS-SMB-03
    title: Sub-Member Vault Namespace Isolation
    rbi_section: "RBI IT Framework — Data Segregation, Chapter IV"
    requirement: >
      Customer data of one bank must not be accessible to another bank.
      Sub-member bank signature and PPS data must be logically segregated.
    status: COMPLIANT
    implementation: |
      SMB vault keys namespaced by sub_member_id:
        sig:{sub_member_id}:{hmac-sha256(account_number)}
        pps:{sub_member_id}:{hmac-sha256(account_number)}
      Sponsor bank workers cannot read SMB vault entries without sub_member_id.
      Cross-SMB vault queries are impossible by key design.
    evidence:
      - "modules/cts/vaults/signature_vault.py"
      - "modules/cts/vaults/pps_vault.py"

