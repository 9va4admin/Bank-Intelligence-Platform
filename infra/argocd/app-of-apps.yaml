# ASTRA ArgoCD App-of-Apps
# ─────────────────────────────────────────────────────────────────────
# Each bank gets up to three ArgoCD Applications:
#   1. astra-platform-{bank_id}  — always installed (shared infra)
#   2. astra-cts-{bank_id}       — installed only if bank purchased CTS
#   3. astra-ej-{bank_id}        — installed only if bank purchased EJ
#
# Bank values live in infra/helm/values/banks/{bank_id}/
#   platform.yaml  — always present
#   cts.yaml       — present only if CTS purchased (ArgoCD discovers via file presence)
#   ej.yaml        — present only if EJ purchased
#
# ArgoCD is installed in the BANK's cluster.
# ASTRA vendor does not have kubectl/ArgoCD access to any bank cluster in production.
# ─────────────────────────────────────────────────────────────────────

# ── 1. astra-platform (every bank) ───────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: astra-platform-banks
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://gitlab.astra.internal/9va4admin/bank-intelligence-platform.git
        revision: main
        files:
          - path: "infra/helm/values/banks/*/platform.yaml"
  template:
    metadata:
      name: "astra-platform-{{ .bank_id }}"
      annotations:
        astra/chart: astra-platform
        astra/chart-version: "{{ .astra.platform_chart_version }}"
    spec:
      project: astra
      source:
        repoURL: oci://registry.astra.internal/charts
        chart: astra-platform
        targetRevision: "{{ .astra.platform_chart_version }}"
        helm:
          valueFiles:
            - $values/infra/helm/values/banks/{{ .bank_id }}/platform.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "astra-platform-{{ .bank_id }}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 3
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m

---
# ── 2. astra-cts (only banks with cts.yaml) ──────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: astra-cts-banks
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://gitlab.astra.internal/9va4admin/bank-intelligence-platform.git
        revision: main
        files:
          # Only generates an Application for banks that HAVE a cts.yaml file.
          # Banks without CTS purchased simply have no cts.yaml — no Application created.
          - path: "infra/helm/values/banks/*/cts.yaml"
  template:
    metadata:
      name: "astra-cts-{{ .bank_id }}"
      annotations:
        astra/chart: astra-cts
        astra/chart-version: "{{ .astra.cts_chart_version }}"
    spec:
      project: astra
      source:
        repoURL: oci://registry.astra.internal/charts
        chart: astra-cts
        targetRevision: "{{ .astra.cts_chart_version }}"
        helm:
          valueFiles:
            - $values/infra/helm/values/banks/{{ .bank_id }}/cts.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "astra-cts-{{ .bank_id }}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 3
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m

---
