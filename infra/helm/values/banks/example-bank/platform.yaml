# example-bank/platform.yaml — Layer 2 overrides for astra-platform chart.
# Applied to every bank regardless of modules purchased.
# ─────────────────────────────────────────────────────────────────────────────
# Changes require: PR to ASTRA repo → bank_it_admin approval → ArgoCD sync
# ─────────────────────────────────────────────────────────────────────────────

bank_id: example-bank             # for ArgoCD platform ApplicationSet generator ({{ .bank_id }})

# ── Global (for Helm templates — .Values.global.*) ───────────────────────────
global:
  bank_id: example-bank
  registry: registry.astra.internal

# ── Module Flags ──────────────────────────────────────────────────────────────
modules:
  cts:
    enabled: true
  ej:
    enabled: true

# ── MinIO Object Store ────────────────────────────────────────────────────────
minio:
  endpoint: "minio.astra-platform-example-bank.svc.cluster.local:9000"
  secure: false

# ── HSM ──────────────────────────────────────────────────────────────────────
hsm:
  transit_key_name: "astra-audit-key-example-bank"

# ── CBS Connector ────────────────────────────────────────────────────────────
cbs_connector_type: finacle        # finacle | bancs | flexcube

# ── Identity Provider ────────────────────────────────────────────────────────
idp:
  type: saml2
  metadata_url: "https://idp.example-bank.internal/saml/metadata"
  # Role mapping in bank IdP must include all ASTRA role names

# ── Data Centers ─────────────────────────────────────────────────────────────
datacenters:
  dc1:
    name: "Mumbai Primary"
    location: "Mumbai"
  dc2:
    name: "Pune DR"
    location: "Pune"
  dc3_backup:
    name: "Hyderabad Tape"
    location: "Hyderabad"

# ── Notifications ────────────────────────────────────────────────────────────
notifications:
  email:
    from_address: "astra-alerts@example-bank.com"
    smtp_relay: "smtp.example-bank.internal"
  whatsapp:
    enabled: false

# ── Shared Services Scale ────────────────────────────────────────────────────
api_gateway:
  replicas: 2
audit_service:
  replicas: 2

# ── ASTRA Chart Version ──────────────────────────────────────────────────────
astra:
  platform_chart_version: "0.1.0"
