# example-bank/cts.yaml — Layer 2 overrides for astra-cts chart.
# Only present at banks where CTS module is purchased.
# ─────────────────────────────────────────────────────────────────────────────
# Changes require: PR to ASTRA repo → bank_it_admin approval → ArgoCD sync
# Layer 3 thresholds (iet_minutes, fraud scores, etc.) are NOT here —
# those are configured post-onboarding via Admin UI maker-checker.
# ─────────────────────────────────────────────────────────────────────────────

bank_id: example-bank
global:
  bank_id: example-bank
  registry: registry.astra.internal

kafka:
  bootstrap_servers: >-
    kafka-broker-0.kafka-broker-headless.astra-platform-example-bank.svc.cluster.local:9092,
    kafka-broker-1.kafka-broker-headless.astra-platform-example-bank.svc.cluster.local:9092,
    kafka-broker-2.kafka-broker-headless.astra-platform-example-bank.svc.cluster.local:9092

clearing_zones: [MUMBAI]          # NGCH zones this bank processes
max_agent_swarm_size: 100         # max parallel cheque-processing pods (pilot sizing)
gpu_profile: pilot                # 4×RTX4090

redis_cts:
  nodes: 6

ai:
  models:
    vision: qwen2-vl-72b-awq
    ocr: got-ocr2
    reasoning: llama-3.3-70b-awq
  timeouts_seconds:
    vision: 120
    ocr: 30
    reasoning: 60

cctv_enabled: false
special_cheque_routes: []

cts_agent_worker:
  min_replicas: 2
  keda_kafka_lag_threshold: 10

astra:
  cts_chart_version: "0.1.0"
