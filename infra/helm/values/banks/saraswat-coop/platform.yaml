# saraswat-coop/platform.yaml — Layer 2 overrides for astra-platform chart.
# Bank: The Saraswat Co-operative Bank Ltd — Pilot Bank #1
# Onboarded: June 2026 | Charter: Urban Co-operative Bank | Regulator: RBI + MCS
# ─────────────────────────────────────────────────────────────────────────────
# Changes require: PR to ASTRA repo → bank_it_admin approval → ArgoCD sync
# Audit trail: every merged PR triggers Immudb ConfigChangeEvent on apply
# ─────────────────────────────────────────────────────────────────────────────

bank_id: saraswat-coop             # for ArgoCD platform ApplicationSet generator ({{ .bank_id }})

# ── Global (for Helm templates — .Values.global.*) ───────────────────────────
# Duplicates bank_id for Helm template access (.Values.global.bank_id).
# registry: internal OCI registry hosting all ASTRA service images.
global:
  bank_id: saraswat-coop
  registry: registry.astra.internal

# ── Module Flags (controls migration Job + KEDA + Temporal workers) ──────────
modules:
  cts:
    enabled: true                      # Saraswat has purchased CTS module
  ej:
    enabled: false                     # EJ not purchased in pilot phase

# ── CBS Connector ────────────────────────────────────────────────────────────
# Saraswat runs Infosys Finacle core banking
cbs_connector_type: finacle

# ── Auth Connector Config ────────────────────────────────────────────────────
# Per-entity-level auth connector. integration_type: saml | ldap_ad | local
# integration_enabled: false → falls through to local (argon2-hashed accounts)
auth:
  # SB staff (Saraswat ops, managers, IT admins) → SAML via ADFS
  sb:
    integration_enabled: true
    integration_type: saml
    saml:
      idp_metadata_url_secret: "secret/astra/saraswat-coop/auth/saml/sb/idp_metadata_url"
      sp_entity_id: "astra-sb-saraswat-coop"
      acs_url: "https://api.saraswat-coop.astra.internal/v1/auth/saml/acs"
      group_role_map:
        "saraswat-cts-reviewer":   ops_reviewer
        "saraswat-fraud-analyst":  fraud_analyst
        "saraswat-ops-manager":    ops_manager
        "saraswat-it-admin":       bank_it_admin
        "saraswat-compliance":     compliance_officer
    clearing_zones: [MUMBAI]

  # Branch scanner operators → LDAP-AD (Saraswat AD domain, LDAPS)
  branch:
    integration_enabled: true
    integration_type: ldap_ad
    ldap_ad:
      server_url: "ldaps://dc.saraswat-coop.local:636"
      base_dn: "DC=saraswat-coop,DC=local"
      user_search_base: "OU=BranchUsers,DC=saraswat-coop,DC=local"
      group_search_base: "OU=ASTRAGroups,DC=saraswat-coop,DC=local"
      bind_dn_secret: "secret/astra/saraswat-coop/auth/ldap/bind_dn"
      bind_pw_secret: "secret/astra/saraswat-coop/auth/ldap/bind_pw"
      group_role_map:
        "CN=ASTRA-BranchReviewers,OU=ASTRAGroups,DC=saraswat-coop,DC=local": ops_reviewer
        "CN=ASTRA-BranchManagers,OU=ASTRAGroups,DC=saraswat-coop,DC=local":  ops_manager

  # Processing Unit (Agency CC) operators → same LDAP-AD
  pu:
    integration_enabled: true
    integration_type: ldap_ad
    ldap_ad:
      server_url: "ldaps://dc.saraswat-coop.local:636"
      base_dn: "DC=saraswat-coop,DC=local"
      user_search_base: "OU=PUUsers,DC=saraswat-coop,DC=local"
      group_search_base: "OU=ASTRAGroups,DC=saraswat-coop,DC=local"
      bind_dn_secret: "secret/astra/saraswat-coop/auth/ldap/bind_dn"
      bind_pw_secret: "secret/astra/saraswat-coop/auth/ldap/bind_pw"
      group_role_map:
        "CN=ASTRA-PUManagers,OU=ASTRAGroups,DC=saraswat-coop,DC=local":  ops_manager
        "CN=ASTRA-PUEditors,OU=ASTRAGroups,DC=saraswat-coop,DC=local":   ops_reviewer

  # SMBs — default is local (argon2) accounts; per-SMB overrides below
  smb:
    default:
      integration_enabled: false
      integration_type: local
    overrides:
      # Example: Pune UCB has its own AD — enable LDAP for them
      # pune-ucb:
      #   integration_enabled: true
      #   integration_type: ldap_ad
      #   ldap_ad:
      #     server_url: "ldaps://dc.pune-ucb.local:636"
      #     base_dn: "DC=pune-ucb,DC=local"
      #     user_search_base: "OU=Users,DC=pune-ucb,DC=local"
      #     group_search_base: "OU=Groups,DC=pune-ucb,DC=local"
      #     bind_dn_secret: "secret/astra/saraswat-coop/smb/pune-ucb/auth/ldap/bind_dn"
      #     bind_pw_secret: "secret/astra/saraswat-coop/smb/pune-ucb/auth/ldap/bind_pw"
      #     group_role_map:
      #       "CN=ASTRA-SMBAdmins,...": smb_admin

# ── Data Centers ─────────────────────────────────────────────────────────────
# Saraswat pilot: single-DC to start; second DC added in Phase 2 (Q4 2026)
datacenters:
  dc1:
    name: "Andheri Data Centre"
    location: "Mumbai"
    zone: "dc1"
  dc2:
    # DR site — provisioned but not yet active; ArgoCD ApplicationSet
    # activates this when dc2_active: true is set in a future PR
    name: "Navi Mumbai DR"
    location: "Navi Mumbai"
    zone: "dc2"
    active: false

# ── NGCH Clearing Zone ───────────────────────────────────────────────────────
clearing_zones: [MUMBAI]

# ── Notifications ────────────────────────────────────────────────────────────
notifications:
  email:
    from_address: "astra-alerts@saraswat.co.in"
    smtp_relay: "smtp.saraswat.co.in"
  whatsapp:
    # WhatsApp alerts for senior ops — enabled for pilot
    enabled: true
    # Phone numbers seeded via Vault at bank onboarding
    # secret: secret/astra/saraswat-coop/whatsapp/business_api_key

# ── Shared Services Scale (Pilot sizing) ─────────────────────────────────────
api_gateway:
  replicas: 2
audit_service:
  replicas: 2
notification_service:
  replicas: 1

# ── Sub-Member Bank Support ──────────────────────────────────────────────────
# Saraswat acts as Sponsor Bank for 2 smaller UCBs routing CTS through them
smb_sponsor_enabled: true
smb_sponsor_max_sub_members: 5      # initial pilot limit

# ── MinIO Object Store (REQUIRED per bank) ───────────────────────────────────
# Internal Kubernetes Service DNS — never a public endpoint.
# secure: false — mTLS is handled by Istio in-cluster; MinIO endpoint is internal.
# The astra-platform chart deploys MinIO in the platform namespace as a StatefulSet.
minio:
  endpoint: "minio.astra-platform-saraswat-coop.svc.cluster.local:9000"
  secure: false

# ── HSM — Vault Transit Key ──────────────────────────────────────────────────
# Bank-specific Vault Transit key for signing audit events before Immudb write.
# Provisioned at bank onboarding:
#   vault write -f transit/keys/astra-audit-key-saraswat-coop type=rsa-4096
# Key name must match the value configured in _build_hsm_signer() at worker startup.
hsm:
  transit_key_name: "astra-audit-key-saraswat-coop"

# ── ASTRA Chart Version ──────────────────────────────────────────────────────
astra:
  platform_chart_version: "0.1.0"
