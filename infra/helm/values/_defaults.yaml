# ASTRA Platform Defaults — Layer 1 (Non-Overridable)
# ─────────────────────────────────────────────────────────────────────
# These values are baked into the Helm chart. No bank values file
# can override them. Changing any of these requires a new chart release
# reviewed by ASTRA's security and compliance team.
# ─────────────────────────────────────────────────────────────────────

platform:
  name: astra
  version: "{{ .Chart.Version }}"   # injected from Chart.yaml

# Security — cannot be disabled by any bank
security:
  min_tls_version: "1.3"
  mtls_mode: STRICT                  # Istio PeerAuthentication: STRICT
  hsm_required: true                 # FIPS 140-2 Level 3 — no software key ops
  data_localisation: enforced        # no customer data leaves bank premises
  secrets_source: vault              # HashiCorp Vault only — no env var secrets

# Audit — cannot be disabled by any bank
audit:
  enabled: true                      # immutable — tampering is cryptographically detectable
  immudb_required: true
  hsm_sign_events: true
  kafka_topic: platform.audit.events

# Workflow safety — cannot be disabled
workflow:
  iet_watchdog_enabled: true         # IETWatchdogWorkflow always spawned
  exactly_once_ngch: true            # Temporal idempotency on all NGCH submissions
  vault_miss_action: HUMAN_REVIEW    # vault miss NEVER auto-returns — always human review

# Module isolation — enforced at namespace level
isolation:
  cts_namespace_prefix: astra-cts
  ej_namespace_prefix: astra-ej
  cross_module_network_policy: DENY  # Istio AuthorizationPolicy default

# Resource guarantees — minimums that cannot be lowered
resources:
  cts_agent_worker:
    min_replicas: 2                  # always 2 warm pods during clearing hours
  ej_normalisation_worker:
    min_replicas: 1

# Observability — always on
observability:
  otel_enabled: true
  langfuse_enabled: true             # every AI call logged
  prometheus_scrape: true
