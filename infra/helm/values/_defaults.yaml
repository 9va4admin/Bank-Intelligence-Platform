# infra/helm/values/_defaults.yaml — Layer 1 + Layer 3 default reference.
# ─────────────────────────────────────────────────────────────────────────────
# THIS FILE IS DOCUMENTATION ONLY — it is NOT loaded by Helm or ArgoCD.
# Actual Layer 1 defaults live in: infra/helm/astra-platform/values.yaml
#                                  infra/helm/astra-cts/values.yaml
#                                  infra/helm/astra-ej/values.yaml
#
# Layer 3 defaults (iet_minutes, thresholds, etc.) are SEEDED into YugabyteDB
# at bank onboarding from infra/helm/astra-cts/values.yaml thresholds: section.
# After onboarding, banks adjust them via Admin UI maker-checker — no Helm change.
#
# This file is the single human-readable reference for ALL default values across
# all layers. Use it to:
#   - Understand what a fresh bank deployment looks like out of the box
#   - Write bank-template.yaml for new bank onboarding
#   - Verify no threshold has been accidentally hardcoded in Python/Go code
#
# Rule (cts.md §"The Golden Rule"):
#   NO Python or Go code may contain a literal version of any value listed here.
#   All thresholds must be fetched at runtime via config_service.get_module_config().
# ─────────────────────────────────────────────────────────────────────────────

# ── Layer 1: Platform Security (NON-OVERRIDABLE by any bank) ─────────────────
# Source: infra/helm/astra-platform/values.yaml security: section
layer1:
  security:
    min_tls_version: "1.3"
    mtls_mode: STRICT
    hsm_required: true
    data_localisation: enforced
    secrets_source: vault

  audit:
    enabled: true
    immudb_required: true
    hsm_sign_events: true

  workflow:
    iet_watchdog_enabled: true          # structural — cannot be disabled by any bank
    exactly_once_ngch: true             # Temporal idempotency
    vault_miss_action: HUMAN_REVIEW     # always HUMAN_REVIEW, never AUTO_RETURN

  minio:
    object_lock:
      enabled: true
      mode: COMPLIANCE                  # cannot be changed to GOVERNANCE
      default_retention_years: 10

# ── Layer 2: Bank-Configurable Platform Defaults ─────────────────────────────
# Source: infra/helm/astra-platform/values.yaml, infra/helm/astra-cts/values.yaml
# Banks override in infra/helm/values/banks/{bank_id}/{chart}.yaml
# Changing these requires a Helm upgrade (no hot-reload).
layer2:
  platform:
    dc_count: 2
    cbs_connector_type: finacle

    ha:
      yugabyte:
        replication_factor: 3
        min_replica_count: 2
      kafka:
        replication_factor: 3
        min_insync_replicas: 2
      temporal:
        dr_cluster_enabled: false
      redis:
        vault_replication_mode: active-passive
        failover_timeout_seconds: 30

    model_drift:
      alert_threshold_pct: 2.0
      tighten_threshold_pct: 5.0
      pull_from_production_pct: 8.0

    hsm:
      transit_key_name: "astra-audit-key"     # banks should use astra-audit-key-{bank_id}

    minio:
      secure: false                            # mTLS via Istio; MinIO endpoint is internal

    audit_service:    replicas: 2
    notification_service: replicas: 2
    api_gateway:      replicas: 2

  cts:
    max_agent_swarm_size: 500
    gpu_profile: pilot                         # upgrade to production (A100) on volume basis
    redis_cts:
      nodes: 6

    cts_agent_worker:
      min_replicas: 2
      keda_kafka_lag_threshold: 10

    keda:
      outward_scanned:
        enabled: true
        min_replicas: 1
        max_replicas: 20
        lag_threshold: "10"
      outward_lot_sealed:
        enabled: true
        min_replicas: 1
        max_replicas: 10
        lag_threshold: "5"
      smb_inbound:
        enabled: false                         # opt-in for SB banks with sub-members

    ai:
      models:
        vision: qwen2-vl-72b-awq
        ocr: got-ocr2
        cctv: internvl2-26b-awq
        reasoning: llama-3.3-70b-awq
      timeouts_seconds:
        vision: 120
        ocr: 30
        reasoning: 60

    vault_sync:
      schedule: "0 6 * * *"                   # 6AM daily — before first clearing session
      cbs_batch_size: 500

    eeh:
      enabled: false
      replicas: 2
      rest_port: 8000
      grpc_port: 50051
      session_ttl_hours: 4
      rate_limit:
        uploads_per_branch_per_minute: 50
      mtls:
        crl_cache_ttl_seconds: 300
        cert_expiry_warn_days: 30
        cert_expiry_critical_days: 7
      envoy:
        enabled: true
        grpc_web_port: 8443
      otel:
        trace_sampling_rate: 1.0

    ieh:
      enabled: false
      replicas: 2
      rest_port: 8001
      grpc_port: 50052
      session_ttl_hours: 4
      envoy:
        enabled: false                         # internal branches use native gRPC

# ── Layer 3: Hot-Reload Threshold Seeds ──────────────────────────────────────
# Source: infra/helm/astra-cts/values.yaml thresholds: section
# These are SEEDED into YugabyteDB at bank onboarding.
# After onboarding, banks change via Admin UI maker-checker (no Helm upgrade needed).
# Hot-reload latency: < 30 seconds (config_service Redis cache TTL).
#
# RULE: No Python/Go code may contain literal versions of these numbers.
#       Always fetch at runtime:
#         thresholds = await config_service.get_module_config("cts", bank_id)
#         if fraud_score > thresholds["human_review_fraud_threshold"]
#
# Source of truth for each threshold's valid range and governance:
#   Layer 1: non-overridable (e.g. vault_miss_action = HUMAN_REVIEW)
#   Layer 3: overridable via Admin UI maker-checker within documented bounds
layer3:
  cts:
    iet_minutes: 180                          # RBI IET mandate: T+3 hours; non-negotiable
    stp_auto_confirm_threshold: 0.92          # fraud score ≤ this → STP confirm (no review)
    human_review_fraud_threshold: 0.72        # fraud score > this → human review queue
    high_value_amount_threshold: 500000       # ₹5,00,000 → human review regardless of score
    signature_min_match_score: 0.85           # Siamese network; below → human review
    ocr_min_confidence: 0.90                  # GOT-OCR2 per-field confidence; below → review
    alteration_risk_threshold: 0.65           # Qwen2-VL tamper risk; above → human review
    iet_emergency_buffer_seconds: 30          # watchdog fires 30s before IET deadline
    human_review_max_wait_minutes: 55         # HumanReviewWorkflow timeout before auto-return
    cheque_validity_days: 90                  # RBI: 3-month validity (Jan 2012 circular)
    pps_mandatory_threshold: 500000           # ₹5,00,000 — PPS check mandatory above this
    shadow_credit_release_hours: 4            # release after 2 return clearing sessions

  platform_health_check:
    cadence_seconds: 60                       # PlatformHealthCheckWorkflow polling interval
    max_human_review_queue_depth: 50          # alert if ops queue exceeds this
    max_human_review_wait_minutes: 45.0       # alert if avg wait exceeds this

# ── Bank Onboarding Checklist ─────────────────────────────────────────────────
# For each new bank, before first ArgoCD sync:
#
# Vault provisioning:
#   vault write -f transit/keys/astra-audit-key-{bank_id} type=rsa-4096
#   vault kv put secret/astra/{bank_id}/db/platform/url value="postgresql://..."
#   vault kv put secret/astra/{bank_id}/db/cts/url value="postgresql://..."
#   vault kv put secret/astra/{bank_id}/redis/cts/auth_token value="..."
#   vault kv put secret/astra/{bank_id}/redis/cts/url value="redis://..."
#   vault kv put secret/astra/{bank_id}/kafka/bootstrap_servers value="..."
#   vault kv put secret/astra/{bank_id}/ngch/sftp_private_key value="..."
#   vault kv put secret/astra/{bank_id}/minio/access_key value="..."
#   vault kv put secret/astra/{bank_id}/minio/secret_key value="..."
#   vault kv put secret/astra/{bank_id}/immudb/admin_password value="..."
#   vault kv put secret/astra/{bank_id}/pii_hash_pepper value="$(openssl rand -hex 32)"
#   vault kv put secret/astra/{bank_id}/auth/session/private_key value="$(cat rsa_private.pem)"
#   vault kv put secret/astra/{bank_id}/auth/session/public_key value="$(cat rsa_public.pem)"
#
# Files to create (copy from example-bank and customise):
#   infra/helm/values/banks/{bank_id}/platform.yaml
#   infra/helm/values/banks/{bank_id}/cts.yaml      (if CTS purchased)
#   infra/helm/values/banks/{bank_id}/ej.yaml       (if EJ purchased)
#
# Required fields in platform.yaml:
#   bank_id:           {bank_id}
#   global.bank_id:    {bank_id}
#   global.registry:   registry.astra.internal
#   modules.cts.enabled: true/false
#   modules.ej.enabled:  true/false
#   minio.endpoint:    minio.astra-platform-{bank_id}.svc.cluster.local:9000
#   hsm.transit_key_name: astra-audit-key-{bank_id}
#   astra.platform_chart_version: {current chart version}
#
# Required fields in cts.yaml:
#   bank_id:           {bank_id}
#   global.bank_id:    {bank_id}
#   global.registry:   registry.astra.internal
#   kafka.bootstrap_servers: {kafka broker list}
#   keda.smb_inbound.enabled: true (if bank is a Sponsor Bank with SMBs)
#   astra.cts_chart_version: {current chart version}
#
# Post-sync validation:
#   kubectl get pods -n astra-platform-{bank_id}    — all pods Running
#   kubectl get pods -n astra-cts-{bank_id}         — all pods Running (if CTS)
#   kubectl get jobs -n astra-platform-{bank_id}    — migration Job Completed
#   kubectl logs job/{release}-pre-upgrade-migration — no ERROR lines in JSONL
