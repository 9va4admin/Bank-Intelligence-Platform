# astra-platform/values.yaml — Layer 1 + Layer 2 defaults for shared platform services.
# Deployed to EVERY bank. Banks cannot disable this chart.
# ─────────────────────────────────────────────────────────────────────────────────────
# Layer 1 (NON-OVERRIDABLE): security, audit, mTLS, data localisation.
#   Changing these requires a new astra-platform chart release.
# Layer 2 (BANK-CONFIGURABLE): topology, scale, CBS connector type.
#   Banks override in infra/helm/values/banks/{bank_id}/platform.yaml
# ─────────────────────────────────────────────────────────────────────────────────────

# ── Global (REQUIRED — set in every bank values file) ───────────────────────
# global.bank_id: "" must be overridden in banks/{bank_id}/platform.yaml.
# global.registry is the internal OCI registry hosting all ASTRA images.
# Both fields are used across multiple templates — must be set before install.
global:
  bank_id: ""                           # REQUIRED: e.g. saraswat-coop
  registry: ""                          # REQUIRED: e.g. registry.astra.internal

platform:
  name: astra
  version: "{{ .Chart.Version }}"

# ── Module Flags (REQUIRED per bank — controls migration Job and KEDA) ───────
# Set true for each module the bank has purchased. Controls:
#   - which Alembic migration chains run in the pre-upgrade Job
#   - which Temporal task queue workers are deployed
#   - which KEDA ScaledObjects are created
modules:
  cts:
    enabled: false                      # override to true in cts-purchasing bank's platform.yaml
  ej:
    enabled: false                      # override to true in ej-purchasing bank's platform.yaml

# ── Security (NON-OVERRIDABLE) ──────────────────────────────────────────────
security:
  min_tls_version: "1.3"
  mtls_mode: STRICT
  hsm_required: true
  data_localisation: enforced
  secrets_source: vault             # all secrets must come from Vault — never env vars

# ── Audit (NON-OVERRIDABLE) ─────────────────────────────────────────────────
audit:
  enabled: true                     # cannot be turned off by any bank
  immudb_required: true
  hsm_sign_events: true
  kafka_topic: platform.audit.events

# ── Module Isolation (NON-OVERRIDABLE) ──────────────────────────────────────
isolation:
  cts_namespace_prefix: astra-cts
  ej_namespace_prefix: astra-ej
  cross_module_network_policy: DENY

# ── Observability (NON-OVERRIDABLE) ─────────────────────────────────────────
observability:
  otel_enabled: true
  langfuse_enabled: true
  prometheus_scrape: true

# ── Deployment Topology (BANK-CONFIGURABLE via platform.yaml) ───────────────
bank_id: ""                         # REQUIRED — set in banks/{bank_id}/platform.yaml
dc_count: 2                         # active-active DC pair
cbs_connector_type: finacle         # finacle | bancs | flexcube

# ── Model Drift Alerting (BANK-CONFIGURABLE) ────────────────────────────────
model_drift:
  alert_threshold_pct: 2.0          # alert if model metric drops > 2% over 7 days
  tighten_threshold_pct: 5.0        # auto-tighten thresholds at 5%
  pull_from_production_pct: 8.0     # pull model from production at 8%

# ── Shared Services Scale (BANK-CONFIGURABLE) ───────────────────────────────
audit_service:
  replicas: 2
notification_service:
  replicas: 2
config_service:
  replicas: 2
api_gateway:
  replicas: 2

# ── Migration Log Storage (BANK-CONFIGURABLE) ────────────────────────────────
# PVC for JSONL migration logs at /var/astra/logs/migrations/{bank_id}/{run_id}/
# Logs survive Job completion and are accessible as MCP resources with bank consent.
migrationLogs:
  storageClass: standard          # override with bank's preferred StorageClass
  storageSize: 5Gi                # ~5 years of migration logs at typical upgrade cadence

# ── High Availability / Disaster Recovery (BANK-CONFIGURABLE, Gemini Fix C) ─
# Gemini evaluation score for HA/DR was 4/10 (lowest).
# This section bakes the corrected defaults into every bank deployment.
# Banks with single-DC pilots may reduce these — documented in upgrade guide.
ha:
  yugabyte:
    replication_factor: 3             # RF=3 across 3 AZs or 3 racks within DC pair
    min_replica_count: 2              # quorum writes — no data loss on single-node failure
    # Requires ≥ 3 YugabyteDB nodes. Pilots with 1 node must override to RF=1.

  kafka:
    replication_factor: 3             # 3 replicas per topic partition
    min_insync_replicas: 2            # acks=all + min.insync=2 enforced on all cts.* topics
    # A cheque event is NOT acknowledged until written to at least 2 brokers.
    # IET safety: if DC1 broker fails, DC2 broker already has the message.

  temporal:
    dr_cluster_enabled: false         # set true per-bank in platform.yaml for warm DR
    primary_cluster: dc1              # Temporal cluster handling live traffic
    dr_cluster: dc2                   # warm DR — workflows replay from history on failover
    # dr_cluster_enabled: true requires dual Temporal clusters deployed (doubles infra cost).
    # Enable for: large banks, banks with zero-RPO SLA. Pilots can start with false.

  redis:
    vault_replication_mode: active-passive   # DC2 redis-cts-replica follows DC1 primary
    failover_timeout_seconds: 30             # Sentinel triggers failover after 30s of DC1 loss
    # active-passive: reads always hit DC1; on DC1 loss, DC2 replica promoted in < 30s.
    # active-active Redis would require CRDT — not supported for Bloom filters (Fix B).

  db:
    connection_pool_per_module: true  # pgbouncer-cts and pgbouncer-ej are separate
    # This prevents CTS load from consuming EJ's connection budget (isolation rule §2.5).

# ── Object Storage (NON-OVERRIDABLE) ────────────────────────────────────────
# MinIO WORM configuration for regulatory preservation.
# RBI IT Framework + Karnataka Bank/PNB CCPs require 10-year retention.
# COMPLIANCE mode (not GOVERNANCE): cannot be overridden even by bank administrators.
# GOVERNANCE mode would allow privileged deletion — not acceptable for clearing records.
minio:
  # ── Connection (BANK-CONFIGURABLE — set in bank platform.yaml) ─────────────
  # endpoint: internal Kubernetes Service DNS — never a public URL.
  # Format: {service}.{namespace}.svc.cluster.local:{port}
  # Example: minio.astra-platform-saraswat-coop.svc.cluster.local:9000
  endpoint: ""                          # REQUIRED per bank
  secure: false                         # false = Istio mTLS handles encryption in-cluster

  # ── Object Lock (NON-OVERRIDABLE) ─────────────────────────────────────────
  object_lock:
    enabled: true
    mode: COMPLIANCE             # COMPLIANCE (not GOVERNANCE) — 10-year regulatory hold
    default_retention_years: 10  # instruments, EJ logs, audit exports
    # ILM tiering handled separately (hot→warm→cold); object lock applies to all tiers.
    # Banks cannot disable or shorten object lock — this is a Layer 1 constraint.
  sse:
    enabled: true
    type: SSE-KMS
    # kms_key_id resolved per bank: vault-transit://astra/{bank_id}/minio-key

# ── HSM (BANK-CONFIGURABLE) ─────────────────────────────────────────────────
# Vault Transit engine used for signing audit events before Immudb write.
# key_name is the Vault Transit key provisioned at bank onboarding:
#   vault write -f transit/keys/astra-audit-key-{bank_id} type=rsa-4096
# Each bank gets an isolated signing key — cross-bank signature verification
# is impossible by design (keys never shared or exported).
hsm:
  transit_key_name: "astra-audit-key"  # default; banks override with astra-audit-key-{bank_id}
