# AUTO-GENERATED by python -m shared.messages.build -- do not edit.
# Source of truth: shared/messages/locales/messages.yaml (incident: blocks).
# Hand-written infra alerts (Kafka lag, Redis eviction, latency) live in
# infra/k8s/monitoring/prometheus-rules.yaml instead.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: astra-incident-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
  - name: bank_infra
    rules:
    - alert: CBSAUTHFAILED
      expr: increase(astra_incident_signal_total{message_key="CBS_AUTH_FAILED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: bank_infra
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CBS_AUTH_FAILED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'CBS {cbs_type} authentication failure for {bank_id} — credentials
          may be stale. Runbook: runbooks/cts/cbs-auth-failed.md'
    - alert: AUTHSAMLIDPUNREACHABLE
      expr: increase(astra_incident_signal_total{message_key="AUTH_SAML_IDP_UNREACHABLE"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: bank_infra
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: AUTH_SAML_IDP_UNREACHABLE — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Bank IdP {idp_entity_id} unreachable — login blocked. Check
          IdP connectivity. Runbook: runbooks/auth/idp-unreachable.md'
    - alert: PLATFORMPOLICYRELOADFAILED
      expr: increase(astra_incident_signal_total{message_key="PLATFORM_POLICY_RELOAD_FAILED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: bank_infra
        incident_class: EXPECTED_DEGRADATION
      annotations:
        summary: PLATFORM_POLICY_RELOAD_FAILED — incident signal fired for bank {{
          $labels.bank_id }}
        description: 'OPA policy {policy_name} v{version} reload failed — {error}.
          Previous version retained. Runbook: runbooks/platform/opa-policy-reload-failed.md'
    - alert: PLATFORMDCFAILOVER
      expr: increase(astra_incident_signal_total{message_key="PLATFORM_DC_FAILOVER"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: bank_infra
        incident_class: EXPECTED_DEGRADATION
      annotations:
        summary: PLATFORM_DC_FAILOVER — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'DC failover triggered — {failed_dc} offline, {active_dc} handling
          100% traffic. Runbook: runbooks/platform/dc-failover.md'
    - alert: AUTHLDAPSERVERUNREACHABLE
      expr: increase(astra_incident_signal_total{message_key="AUTH_LDAP_SERVER_UNREACHABLE"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: bank_infra
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: AUTH_LDAP_SERVER_UNREACHABLE — incident signal fired for bank {{
          $labels.bank_id }}
        description: 'LDAP/AD server {server_url} unreachable for {entity_type} auth
          at bank {bank_id}. Users cannot log in. Check network and LDAPS port 636.
          Runbook: runbooks/auth/ldap-unreachable.md'
    - alert: AUTHCONNECTORCONFIGMISSING
      expr: increase(astra_incident_signal_total{message_key="AUTH_CONNECTOR_CONFIG_MISSING"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: bank_infra
        incident_class: STRUCTURAL
      annotations:
        summary: AUTH_CONNECTOR_CONFIG_MISSING — incident signal fired for bank {{
          $labels.bank_id }}
        description: 'Auth connector configuration missing for {entity_type} at bank
          {bank_id}. Users cannot log in. Update Helm Layer 2 values. Runbook: runbooks/auth/connector-config-missing.md'
  - name: compliance_review
    rules:
    - alert: PLATFORMAUDITWRITEFAILED
      expr: increase(astra_incident_signal_total{message_key="PLATFORM_AUDIT_WRITE_FAILED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: compliance_review
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: PLATFORM_AUDIT_WRITE_FAILED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Immudb write failed for event {event_type} on {instrument_id}
          — retrying (attempt {attempt}). Runbook: runbooks/platform/audit-write-failed.md'
    - alert: PLATFORMAUDITTAMPERDETECTED
      expr: increase(astra_incident_signal_total{message_key="PLATFORM_AUDIT_TAMPER_DETECTED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: compliance_review
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: PLATFORM_AUDIT_TAMPER_DETECTED — incident signal fired for bank {{
          $labels.bank_id }}
        description: 'Immudb Merkle tree inconsistency detected in collection {collection}
          — security team notified. Runbook: runbooks/platform/audit-tamper-detected.md'
  - name: cts_ai_platform
    rules:
    - alert: PLATFORMMODELDRIFTCRITICAL
      expr: increase(astra_incident_signal_total{message_key="PLATFORM_MODEL_DRIFT_CRITICAL"}[5m])
        > 0
      for: 0s
      labels:
        severity: warning
        module: platform
        owning_team: cts_ai_platform
        incident_class: EXPECTED_DEGRADATION
      annotations:
        summary: PLATFORM_MODEL_DRIFT_CRITICAL — incident signal fired for bank {{
          $labels.bank_id }}
        description: 'Model {model_name} drift critical — {metric} dropped {drop_pct}%,
          exceeding {threshold_pct}% threshold. Auto-tightening. Runbook: runbooks/platform/model-drift-critical.md'
    - alert: PLATFORMMODELPULLED
      expr: increase(astra_incident_signal_total{message_key="PLATFORM_MODEL_PULLED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: cts_ai_platform
        incident_class: EXPECTED_DEGRADATION
      annotations:
        summary: PLATFORM_MODEL_PULLED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Model {model_name} pulled from production — {metric} degraded
          beyond safe threshold. Human review mandatory. Runbook: runbooks/platform/model-pulled.md'
  - name: cts_clearing_ops
    rules:
    - alert: CTSWFCBSACCOUNTFROZEN
      expr: increase(astra_incident_signal_total{message_key="CTS_WF_CBS_ACCOUNT_FROZEN"}[900s])
        > 20
      for: 0s
      labels:
        severity: warning
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SECURITY
      annotations:
        summary: CTS_WF_CBS_ACCOUNT_FROZEN — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Account {account_display} is frozen — {instrument_id} returned
          immediately. Runbook: runbooks/cts/account-frozen-spike.md'
    - alert: CTSWFCBSACCOUNTCLOSED
      expr: increase(astra_incident_signal_total{message_key="CTS_WF_CBS_ACCOUNT_CLOSED"}[900s])
        > 20
      for: 0s
      labels:
        severity: warning
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SECURITY
      annotations:
        summary: CTS_WF_CBS_ACCOUNT_CLOSED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Account {account_display} is closed — {instrument_id} returned
          immediately. Runbook: runbooks/cts/account-closed-spike.md'
    - alert: CTSWFSTOPPAYMENTHIT
      expr: increase(astra_incident_signal_total{message_key="CTS_WF_STOP_PAYMENT_HIT"}[900s])
        > 20
      for: 0s
      labels:
        severity: warning
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SECURITY
      annotations:
        summary: CTS_WF_STOP_PAYMENT_HIT — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Stop payment instruction active for {instrument_id} on {account_display}
          — returned immediately. Runbook: runbooks/cts/stop-payment-spike.md'
    - alert: CTSWFIETWATCHDOGFIRED
      expr: increase(astra_incident_signal_total{message_key="CTS_WF_IET_WATCHDOG_FIRED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CTS_WF_IET_WATCHDOG_FIRED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'IET watchdog triggered for {instrument_id} — emergency filing
          initiated with {seconds_remaining}s remaining. Runbook: runbooks/cts/iet-watchdog-fired.md'
    - alert: CTSKSENGAGED
      expr: increase(astra_incident_signal_total{message_key="CTS_KS_ENGAGED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CTS_KS_ENGAGED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Vision AI kill switch engaged — mode={mode} scope={scope} bank={bank_id}
          by {activated_by}. All affected instruments routed to human review. Runbook:
          runbooks/cts/kill-switch-engaged.md'
    - alert: CTSOUTREPRESENTATIONEXPIRED
      expr: increase(astra_incident_signal_total{message_key="CTS_OUT_REPRESENTATION_EXPIRED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CTS_OUT_REPRESENTATION_EXPIRED — incident signal fired for bank {{
          $labels.bank_id }}
        description: 'Re-presentation window expired for {instrument_id} (code {return_reason_code})
          — {representation_window_hours}-hour limit breached. Manual action required.
          Runbook: '
    - alert: CTSNGCHSUBMITFAILEDTERMINAL
      expr: increase(astra_incident_signal_total{message_key="CTS_NGCH_SUBMIT_FAILED_TERMINAL"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: TRANSIENT_RETRYABLE
      annotations:
        summary: CTS_NGCH_SUBMIT_FAILED_TERMINAL — incident signal fired for bank
          {{ $labels.bank_id }}
        description: 'NGCH submission permanently failed for {instrument_id} after
          {max_attempts} attempts — manual intervention required. Runbook: runbooks/cts/ngch-filing-terminal-failure.md'
    - alert: CTSNGCHIETEXPIRED
      expr: increase(astra_incident_signal_total{message_key="CTS_NGCH_IET_EXPIRED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CTS_NGCH_IET_EXPIRED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'IET window expired for {instrument_id} — deemed approval in
          effect. Bank is liable. Runbook: runbooks/cts/iet-expired.md'
    - alert: CTSNGCHAUTHCERTEXPIRED
      expr: increase(astra_incident_signal_total{message_key="CTS_NGCH_AUTH_CERT_EXPIRED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CTS_NGCH_AUTH_CERT_EXPIRED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'NGCH mTLS certificate expired for {bank_id} — renewing from
          Vault. Filings paused. Runbook: runbooks/cts/ngch-cert-expired.md'
    - alert: CBSACCOUNTFROZEN
      expr: increase(astra_incident_signal_total{message_key="CBS_ACCOUNT_FROZEN"}[900s])
        > 20
      for: 0s
      labels:
        severity: warning
        module: platform
        owning_team: cts_clearing_ops
        incident_class: SECURITY
      annotations:
        summary: CBS_ACCOUNT_FROZEN — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Account {account_display} is frozen in CBS — {instrument_id}
          returned immediately. Runbook: runbooks/cts/account-frozen-spike.md'
    - alert: CBSACCOUNTCLOSED
      expr: increase(astra_incident_signal_total{message_key="CBS_ACCOUNT_CLOSED"}[900s])
        > 20
      for: 0s
      labels:
        severity: warning
        module: platform
        owning_team: cts_clearing_ops
        incident_class: SECURITY
      annotations:
        summary: CBS_ACCOUNT_CLOSED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Account {account_display} is closed in CBS — {instrument_id}
          returned immediately. Runbook: runbooks/cts/account-closed-spike.md'
    - alert: CBSSTOPPAYMENTACTIVE
      expr: increase(astra_incident_signal_total{message_key="CBS_STOP_PAYMENT_ACTIVE"}[900s])
        > 20
      for: 0s
      labels:
        severity: warning
        module: platform
        owning_team: cts_clearing_ops
        incident_class: SECURITY
      annotations:
        summary: CBS_STOP_PAYMENT_ACTIVE — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Stop payment instruction active for {instrument_id} on {account_display}
          — returned immediately. Runbook: runbooks/cts/stop-payment-spike.md'
    - alert: VAULTSIGSTALE
      expr: increase(astra_incident_signal_total{message_key="VAULT_SIG_STALE"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: VAULT_SIG_STALE — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Signature vault stale for {bank_id} — last sync {hours_ago}h
          ago. All inward cheques to human review. Runbook: runbooks/cts/vault-stale.md'
    - alert: VAULTSIGINTEGRITYFAIL
      expr: increase(astra_incident_signal_total{message_key="VAULT_SIG_INTEGRITY_FAIL"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: VAULT_SIG_INTEGRITY_FAIL — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Signature vault integrity check failed for {bank_id} — {corrupt_count}
          entries corrupted. Resync required. Runbook: runbooks/cts/vault-integrity-fail.md'
    - alert: PLATFORMCBSUNREACHABLE
      expr: increase(astra_incident_signal_total{message_key="PLATFORM_CBS_UNREACHABLE"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: cts_clearing_ops
        incident_class: EXPECTED_DEGRADATION
      annotations:
        summary: PLATFORM_CBS_UNREACHABLE — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'CBS {cbs_type} unreachable for {bank_id} — degraded mode active.
          Balance checks deferred. Runbook: runbooks/platform/cbs-unreachable.md'
    - alert: VAULTSTALE
      expr: increase(astra_incident_signal_total{message_key="VAULT_STALE"}[5m]) >
        0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: VAULT_STALE — incident signal fired for bank {{ $labels.bank_id }}
        description: 'Vault data stale for {bank_id} ({vault_type}) — {staleness_minutes}
          minutes since last sync. All instruments routing to human review. Runbook:
          runbooks/cts/vault-stale.md'
    - alert: VAULTINTEGRITYFAIL
      expr: increase(astra_incident_signal_total{message_key="VAULT_INTEGRITY_FAIL"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: platform
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: VAULT_INTEGRITY_FAIL — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Vault integrity check FAILED for {bank_id} ({vault_type}) —
          {error_detail}. Vault halted, all instruments routed to human review. Runbook:
          runbooks/cts/vault-integrity-fail.md'
    - alert: CTSNGCHTERMINALFAILURE
      expr: increase(astra_incident_signal_total{message_key="CTS_NGCH_TERMINAL_FAILURE"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: TRANSIENT_RETRYABLE
      annotations:
        summary: CTS_NGCH_TERMINAL_FAILURE — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'NGCH filing FAILED terminally for cheque {instrument_id} ({bank_id})
          — error {error_code} after {retry_count} retries. Manual intervention required.
          Runbook: runbooks/cts/ngch-filing-terminal-failure.md'
    - alert: CTSNGCHCERTEXPIRED
      expr: increase(astra_incident_signal_total{message_key="CTS_NGCH_CERT_EXPIRED"}[5m])
        > 0
      for: 0s
      labels:
        severity: critical
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CTS_NGCH_CERT_EXPIRED — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'NGCH mTLS certificate expired for {bank_id} (expired {cert_expiry}).
          All NGCH filing halted — rotate certificate immediately. Runbook: runbooks/cts/ngch-cert-expired.md'
    - alert: CTSSMBSPONSORSETTLEMENTINSUFFICIENT
      expr: increase(astra_incident_signal_total{message_key="CTS_SMB_SPONSOR_SETTLEMENT_INSUFFICIENT"}[5m])
        > 0
      for: 0s
      labels:
        severity: warning
        module: cts
        owning_team: cts_clearing_ops
        incident_class: SAFETY_BOUNDARY
      annotations:
        summary: CTS_SMB_SPONSOR_SETTLEMENT_INSUFFICIENT — incident signal fired for
          bank {{ $labels.bank_id }}
        description: 'SMB {sub_member_id} settlement funds insufficient at {sponsor_bank_id}
          — batch of {instrument_count} instruments blocked. URRBCH code 25 applied.
          Runbook: runbooks/cts/smb-settlement-insufficient.md'
  - name: ej_ops
    rules:
    - alert: EJEDGEBUFFERFULL
      expr: increase(astra_incident_signal_total{message_key="EJ_EDGE_BUFFER_FULL"}[5m])
        > 0
      for: 0s
      labels:
        severity: warning
        module: ej
        owning_team: ej_ops
        incident_class: EXPECTED_DEGRADATION
      annotations:
        summary: EJ_EDGE_BUFFER_FULL — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'Edge buffer full for ATM {atm_id} — oldest logs being overwritten.
          Immediate connectivity check required. Runbook: runbooks/ej/edge-buffer-full.md'
    - alert: EJATMHEALTHCRITICAL
      expr: increase(astra_incident_signal_total{message_key="EJ_ATM_HEALTH_CRITICAL"}[5m])
        > 0
      for: 0s
      labels:
        severity: warning
        module: ej
        owning_team: ej_ops
        incident_class: STRUCTURAL
      annotations:
        summary: EJ_ATM_HEALTH_CRITICAL — incident signal fired for bank {{ $labels.bank_id
          }}
        description: 'ATM {atm_id} in critical state — {fault_description}. Immediate
          attention required. Runbook: runbooks/ej/atm-health-critical.md'
