---
# 3C: Kill ALL vLLM workers simultaneously (maximum stress)
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: vllm-all-workers-kill
  namespace: astra-cts-saraswat-coop
  labels:
    astra.chaos/scenario: vllm-gpu-failure
    astra.chaos/subscenario: "3C-all"
    astra.chaos/bank_id: saraswat-coop
    astra.chaos/severity: critical
spec:
  action: pod-kill
  mode: all
  selector:
    namespaces:
      - astra-cts-saraswat-coop
    labelSelectors:
      app.kubernetes.io/name: vllm-worker
  duration: "5m"
  scheduler:
    cron: "@manual"
---
# Pass criteria for all 3 sub-scenarios:
#
#   1. prometheus: cts_iet_breach_total == 0  (IET Watchdog still files)
#   2. prometheus: cts_decision_outcome{outcome="HUMAN_REVIEW", reason="MODEL_UNAVAILABLE"} > 0
#   3. prometheus: cts_decision_outcome{outcome="AUTO_RETURN"} == 0
#   4. Temporal UI: ChequeProcessingWorkflow reaches HUMAN_REVIEW (not FAILED)
#   5. IETWatchdogWorkflow: no EMERGENCY_FILED events (cheques should resolve before T-30s)
#      EXCEPT if total outage lasts > (IET_minutes - 0.5) minutes — emergency filer is expected then.
#
# Human review queue: expected to spike significantly during vLLM outage.
# ops_reviewers must be staffed during any planned chaos test.
